services:
  db:
    image: postgres:16-alpine
    container_name: simplewallet-db
    environment:
      POSTGRES_DB: simplewallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simplewallet"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/SimpleWallet.Api/Dockerfile
    container_name: simplewallet-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DatabaseProvider: Postgres
      ConnectionStrings__PostgresConnection: Host=db;Port=5432;Database=simplewallet;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

